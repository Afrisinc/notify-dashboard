name: Deploy AfrisInc Notify - Staging

on:
  push:
    branches:
      - release  # deploy on pushes to develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_GHCR_USERNAME: ${{ secrets.DEPLOY_GHCR_USERNAME }}
      DEPLOY_GHCR_TOKEN: ${{ secrets.DEPLOY_GHCR_TOKEN }}


    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set image tags
      - name: Set image tags
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "staging_tag=staging" >> $GITHUB_OUTPUT

      # Step 3: Login to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_OWNER }}  # org name, e.g., afrisinc
          password: ${{ secrets.GHCR_TOKEN }}  # your PAT

      # Step 4: Build Docker image
      - name: Build Docker image
        run: |
          docker build \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_STAGING_URL }} \
            -t ghcr.io/${{ secrets.GHCR_OWNER }}/afrisinc-notify:${{ steps.meta.outputs.short_sha }} \
            -t ghcr.io/${{ secrets.GHCR_OWNER }}/afrisinc-notify:${{ steps.meta.outputs.staging_tag }} .

      # Step 5: Push Docker images
      - name: Push Docker images
        run: |
          docker push ghcr.io/${{ secrets.GHCR_OWNER }}/afrisinc-notify:${{ steps.meta.outputs.short_sha }}
          docker push ghcr.io/${{ secrets.GHCR_OWNER }}/afrisinc-notify:${{ steps.meta.outputs.staging_tag }}

      # Step 5: SSH deploy to VPS
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 10m

          # 🔐 PASS DEPLOY CREDS TO VPS
          envs: DEPLOY_GHCR_USERNAME,DEPLOY_GHCR_TOKEN  
          script: |
            set -e
            APP_PATH="${{ secrets.VPS_APP_PATH }}/afrisinc-notify/staging"
            cd $APP_PATH

            echo "$DEPLOY_GHCR_TOKEN" | docker login ghcr.io -u "$DEPLOY_GHCR_USERNAME" --password-stdin

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -af
            docker compose ps